name: Update Codex

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/update-codex.yml
      - home-manager/pkgs/codex/**
  schedule:
    - cron: "37 4 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write

concurrency:
  group: update-codex
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update package if needed
        id: update
        run: |
          ./home-manager/pkgs/codex/update-if-needed.sh

          if git diff --quiet -- home-manager/pkgs/codex/package.nix home-manager/pkgs/codex/librusty_v8.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(sed -n 's/^[[:space:]]*version = "\(.*\)";$/\1/p' home-manager/pkgs/codex/package.nix)"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit and push package update
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add home-manager/pkgs/codex/package.nix home-manager/pkgs/codex/librusty_v8.nix
          git commit -m "Update codex to ${{ steps.update.outputs.version }}"
          git push origin HEAD:master
