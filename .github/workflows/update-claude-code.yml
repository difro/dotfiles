name: Update Claude Code

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/update-claude-code.yml
      - home-manager/pkgs/claude-code/**
  schedule:
    - cron: "17 4 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write

concurrency:
  group: update-claude-code
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Update manifest if needed
        id: update
        run: |
          ./home-manager/pkgs/claude-code/update-if-needed.sh

          if git diff --quiet -- home-manager/pkgs/claude-code/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(sed -n 's/^  "version": "\(.*\)",$/\1/p' home-manager/pkgs/claude-code/manifest.json)"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit and push manifest update
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add home-manager/pkgs/claude-code/manifest.json
          git commit -m "Update claude-code to ${{ steps.update.outputs.version }}"
          git push origin HEAD:master
